<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="TaskMate"/>
<meta name="theme-color" content="#6366f1"/>
<title>TaskMate v2</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display',sans-serif}
:root{
  --indigo:#6366f1;--indigo-dark:#4f46e5;--purple:#8b5cf6;
  --green:#22c55e;--amber:#f59e0b;--red:#ef4444;--blue:#3b82f6;
  --slate:#64748b;--bg:#f8fafc;--card:#fff;--border:#e2e8f0;
  --text:#0f172a;--text2:#64748b;--text3:#94a3b8;
  --loan:#e11d48;--loan-light:#fff1f2;
}
body{background:var(--bg);display:flex;justify-content:center;min-height:100vh}
#app{width:100%;max-width:430px;background:var(--bg);min-height:100vh;display:flex;flex-direction:column;position:relative}

/* HEADER — no stats row, just greeting + add button */
.header{background:linear-gradient(135deg,var(–indigo-dark) 0%,var(–purple) 100%);padding:calc(env(safe-area-inset-top)+16px) 20px 24px;position:relative;overflow:hidden}
.header::before{content:’’;position:absolute;top:-40px;right:-40px;width:160px;height:160px;background:rgba(255,255,255,0.06);border-radius:50%}
.header::after{content:’’;position:absolute;bottom:-60px;left:-20px;width:200px;height:200px;background:rgba(255,255,255,0.04);border-radius:50%}
.header-row{display:flex;justify-content:space-between;align-items:flex-start;position:relative;z-index:1}
.header h1{color:#fff;font-size:26px;font-weight:800;letter-spacing:-0.5px}
.header .sub{color:rgba(255,255,255,0.65);font-size:13px;margin-bottom:3px}
.header-actions{display:flex;gap:10px}
.icon-btn{width:40px;height:40px;background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.2);border-radius:12px;color:#fff;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.2s;backdrop-filter:blur(10px)}
.icon-btn:active{transform:scale(0.92);background:rgba(255,255,255,0.25)}

/* CATEGORY TABS */
.cat-scroll{background:#fff;border-bottom:1px solid var(–border);overflow-x:auto;scrollbar-width:none;display:flex;padding:0 12px}
.cat-scroll::-webkit-scrollbar{display:none}
.cat-tab{flex-shrink:0;padding:14px 16px;border:none;background:none;font-size:13px;font-weight:600;color:var(–text3);cursor:pointer;border-bottom:2px solid transparent;transition:.2s;white-space:nowrap}
.cat-tab.active{color:var(–indigo);border-bottom-color:var(–indigo)}

/* CONTENT */
.content{flex:1;overflow-y:auto;padding-bottom:100px}
.page{display:none}
.page.active{display:block}
.pad{padding:16px}

/* CARDS */
.card{background:var(–card);border-radius:20px;border:1px solid var(–border);box-shadow:0 1px 8px rgba(0,0,0,0.05);margin-bottom:12px;overflow:hidden}
.card-header{padding:16px 16px 0;display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.card-title{font-size:13px;font-weight:700;color:var(–text2);text-transform:uppercase;letter-spacing:.05em}

/* TODAY’S TASKS CARD — highlighted section */
.today-section{background:linear-gradient(135deg,#0f172a 0%,#1e293b 100%);border-radius:20px;padding:18px;margin-bottom:14px;position:relative;overflow:hidden}
.today-section::before{content:’’;position:absolute;top:-30px;right:-30px;width:120px;height:120px;background:rgba(99,102,241,0.15);border-radius:50%}
.today-section::after{content:’’;position:absolute;bottom:-40px;left:-20px;width:140px;height:140px;background:rgba(139,92,246,0.1);border-radius:50%}
.today-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;position:relative;z-index:1}
.today-title{font-size:15px;font-weight:800;color:#fff;display:flex;align-items:center;gap:8px}
.today-badge{background:var(–red);color:#fff;font-size:11px;font-weight:700;padding:3px 10px;border-radius:99px}
.today-badge.done{background:var(–green)}
.today-task{background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.12);border-radius:14px;padding:13px;margin-bottom:8px;position:relative;z-index:1;transition:.2s}
.today-task:last-child{margin-bottom:0}
.today-task.done-today{opacity:.5}
.today-task-row{display:flex;align-items:flex-start;gap:10px}
.today-chk{width:24px;height:24px;border-radius:7px;border:2px solid rgba(255,255,255,0.3);display:flex;align-items:center;justify-content:center;font-size:11px;cursor:pointer;flex-shrink:0;margin-top:1px;transition:.2s;font-weight:700}
.today-chk.done-chk{border-color:var(–green);background:rgba(34,197,94,0.2);color:var(–green)}
.today-chk:active{transform:scale(0.88)}
.today-task-title{font-size:13px;font-weight:600;color:#fff;line-height:1.35;flex:1}
.today-task-title.done-text{text-decoration:line-through;color:rgba(255,255,255,0.4)}
.today-meta{display:flex;gap:5px;margin-top:7px;flex-wrap:wrap}
.today-pill{font-size:10px;padding:2px 8px;border-radius:99px;font-weight:700}
.tp-high{background:rgba(239,68,68,0.25);color:#fca5a5}
.tp-medium{background:rgba(245,158,11,0.25);color:#fcd34d}
.tp-low{background:rgba(34,197,94,0.25);color:#86efac}
.tp-cat{background:rgba(139,92,246,0.25);color:#c4b5fd}
.today-empty{text-align:center;padding:20px;position:relative;z-index:1}
.today-empty .e-ico{font-size:32px;margin-bottom:8px}
.today-empty .e-txt{color:rgba(255,255,255,0.6);font-size:13px;font-weight:600}

/* PROGRESS RING CARD — kept small/simple for alerts only */
.ring-row{display:flex;align-items:center;gap:20px;position:relative;z-index:1}
.ring-wrap{position:relative;width:80px;height:80px;flex-shrink:0}
.ring-wrap svg{transform:rotate(-90deg)}
.ring-lbl{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:800;color:#fff}
.ring-info .big{font-size:28px;font-weight:800;color:#fff;line-height:1}
.ring-info .sm{font-size:12px;color:rgba(255,255,255,0.7);margin-top:4px}
.ring-info .badge{display:inline-block;margin-top:6px;font-size:11px;background:rgba(255,100,100,0.3);color:#fca5a5;padding:3px 10px;border-radius:99px;font-weight:600}

/* TASK CARD */
.task-card{background:var(–card);border-radius:16px;border:1px solid var(–border);padding:14px;margin-bottom:8px;box-shadow:0 1px 4px rgba(0,0,0,0.04);transition:.15s;cursor:default}
.task-card:active{transform:scale(0.99)}
.task-card.overdue{border-color:#fecaca;background:#fff5f5}
.task-card.done-card{opacity:.6}
.tc-row{display:flex;align-items:flex-start;gap:11px}
.tc-check{width:26px;height:26px;border-radius:8px;border:2px solid var(–border);display:flex;align-items:center;justify-content:center;font-size:12px;cursor:pointer;flex-shrink:0;margin-top:1px;transition:.2s;font-weight:700}
.tc-check:active{transform:scale(0.88)}
.chk-todo{border-color:#cbd5e1;color:transparent}
.chk-prog{border-color:var(–blue);background:#eff6ff;color:var(–blue)}
.chk-done{border-color:var(–green);background:#f0fdf4;color:var(–green)}
.tc-body{flex:1;min-width:0}
.tc-title{font-size:14px;font-weight:600;color:var(–text);line-height:1.35}
.tc-title.done{text-decoration:line-through;color:var(–text3)}
.tc-meta{display:flex;flex-wrap:wrap;gap:5px;margin-top:7px;align-items:center}
.pill{font-size:11px;padding:3px 9px;border-radius:99px;font-weight:600;white-space:nowrap}
.pill-high{background:#fef2f2;color:#dc2626}
.pill-medium{background:#fffbeb;color:#b45309}
.pill-low{background:#f0fdf4;color:#16a34a}
.pill-todo{background:#f1f5f9;color:#475569}
.pill-prog{background:#eff6ff;color:#2563eb}
.pill-done{background:#f0fdf4;color:#16a34a}
.pill-cat{background:#f5f3ff;color:#7c3aed}
.date-lbl{font-size:11px;color:var(–text3)}
.date-lbl.urgent{color:#ef4444;font-weight:700}
.date-lbl.soon{color:#f59e0b;font-weight:600}
.countdown{font-size:10px;padding:2px 7px;border-radius:99px;font-weight:700}
.cd-overdue{background:#fef2f2;color:#dc2626}
.cd-today{background:#fff7ed;color:#ea580c}
.cd-soon{background:#fffbeb;color:#b45309}
.cd-ok{background:#f0fdf4;color:#16a34a}
.tc-actions{display:flex;gap:2px;flex-shrink:0}
.tc-actions button{background:none;border:none;cursor:pointer;font-size:15px;padding:5px;opacity:.35;transition:.2s;border-radius:8px}
.tc-actions button:hover{opacity:1;background:var(–bg)}

/* FILTER BAR */
.filter-bar{display:flex;gap:7px;overflow-x:auto;padding:12px 16px 0;scrollbar-width:none;margin-bottom:4px}
.filter-bar::-webkit-scrollbar{display:none}
.fb{padding:7px 14px;border-radius:99px;border:none;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;transition:.2s}
.fb:active{transform:scale(0.95)}
.fb-on-s{background:var(–indigo);color:#fff}
.fb-on-p{background:var(–purple);color:#fff}
.fb-off{background:#f1f5f9;color:var(–text2)}
.sort-sel{margin-left:auto;padding:7px 12px;border-radius:99px;border:1px solid var(–border);font-size:12px;background:#fff;color:var(–text2);outline:none;flex-shrink:0}

/* ALERT BANNERS */
.alert{border-radius:16px;padding:13px 14px;display:flex;align-items:flex-start;gap:11px;margin-bottom:12px;cursor:pointer;transition:.2s}
.alert:active{transform:scale(0.99)}
.alert-red{background:#fef2f2;border:1px solid #fecaca}
.alert-amber{background:#fffbeb;border:1px solid #fde68a}
.alert-blue{background:#eff6ff;border:1px solid #bfdbfe}
.alert-green{background:#f0fdf4;border:1px solid #bbf7d0}
.alert .ico{font-size:20px;flex-shrink:0;margin-top:1px}
.alert .atitle{font-size:13px;font-weight:700}
.alert .asub{font-size:11px;margin-top:2px;opacity:.8}
.alert-red .atitle{color:#dc2626}.alert-red .asub{color:#ef4444}
.alert-amber .atitle{color:#b45309}.alert-amber .asub{color:#d97706}
.alert-blue .atitle{color:#1d4ed8}.alert-blue .asub{color:#3b82f6}
.alert-green .atitle{color:#15803d}.alert-green .asub{color:#22c55e}

/* SEARCH BAR */
.search-wrap{padding:12px 16px 0}
.search-box{display:flex;align-items:center;gap:10px;background:var(–card);border:1px solid var(–border);border-radius:14px;padding:11px 14px}
.search-box input{flex:1;border:none;outline:none;font-size:14px;color:var(–text);background:transparent}
.search-box input::placeholder{color:var(–text3)}
.search-ico{color:var(–text3);font-size:16px}

/* EMPTY STATE */
.empty-state{text-align:center;padding:50px 20px}
.empty-state .emoji{font-size:44px;margin-bottom:12px}
.empty-state .etitle{font-size:16px;font-weight:700;color:var(–text2);margin-bottom:6px}
.empty-state .esub{font-size:13px;color:var(–text3)}

/* FAB */
.fab{position:fixed;bottom:calc(24px + env(safe-area-inset-bottom));right:calc(50% - 215px + 20px);width:56px;height:56px;background:linear-gradient(135deg,var(–indigo),var(–purple));border:none;border-radius:18px;color:#fff;font-size:26px;cursor:pointer;box-shadow:0 6px 24px rgba(99,102,241,0.45);display:flex;align-items:center;justify-content:center;transition:.2s;z-index:50}
.fab:active{transform:scale(0.92)}
@media(max-width:430px){.fab{right:20px}}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.55);display:none;align-items:flex-end;z-index:200;backdrop-filter:blur(4px)}
.overlay.open{display:flex}
.modal{background:var(–card);width:100%;max-width:430px;margin:0 auto;border-radius:28px 28px 0 0;padding:24px;max-height:90vh;overflow-y:auto;padding-bottom:calc(24px + env(safe-area-inset-bottom))}
.modal-handle{width:36px;height:4px;background:var(–border);border-radius:99px;margin:0 auto 20px}
.modal h2{font-size:20px;font-weight:800;color:var(–text);margin-bottom:4px}
.modal .modal-sub{font-size:13px;color:var(–text2);margin-bottom:20px}
.modal-close{position:absolute;top:24px;right:24px;background:var(–bg);border:none;width:32px;height:32px;border-radius:10px;font-size:16px;color:var(–text2);cursor:pointer;display:flex;align-items:center;justify-content:center}
.field{margin-bottom:14px}
.field label{display:block;font-size:11px;font-weight:700;color:var(–text2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px}
.field input,.field select,.field textarea{width:100%;border:1.5px solid var(–border);border-radius:12px;padding:12px 14px;font-size:14px;outline:none;background:var(–bg);color:var(–text);transition:.2s;-webkit-appearance:none;font-family:inherit}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(–indigo);background:#fff}
.field textarea{resize:none;height:72px}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.type-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px}
.type-opt{padding:10px 6px;border-radius:12px;border:2px solid var(–border);background:var(–bg);font-size:11px;font-weight:700;color:var(–text2);cursor:pointer;text-align:center;transition:.2s}
.type-opt.selected{border-color:var(–indigo);background:#eef2ff;color:var(–indigo)}
.save-btn{width:100%;padding:16px;background:linear-gradient(135deg,var(–indigo),var(–purple));color:#fff;font-size:15px;font-weight:800;border:none;border-radius:16px;cursor:pointer;margin-top:8px;transition:.2s;letter-spacing:.01em}
.save-btn:active{transform:scale(0.98)}
.modal-type-tabs{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap}
.mtt{flex:1;padding:10px;border-radius:12px;border:2px solid var(–border);background:var(–bg);font-size:12px;font-weight:700;color:var(–text2);cursor:pointer;text-align:center;transition:.2s;min-width:80px}
.mtt.on{border-color:var(–indigo);background:#eef2ff;color:var(–indigo)}

/* SECTION DIVIDER */
.sec-div{font-size:12px;font-weight:700;color:var(–text2);text-transform:uppercase;letter-spacing:.06em;padding:16px 16px 8px;display:flex;align-items:center;gap:8px}
.sec-div::after{content:’’;flex:1;height:1px;background:var(–border)}

/* NO TASKS */
.no-items{text-align:center;padding:30px 20px;color:var(–text3);font-size:13px}

/* FINANCE SUMMARY */
.fin-summary{background:linear-gradient(135deg,#065f46,#047857);border-radius:20px;padding:20px;margin-bottom:12px;position:relative;overflow:hidden}
.fin-summary::before{content:’’;position:absolute;top:-20px;right:-20px;width:100px;height:100px;background:rgba(255,255,255,0.07);border-radius:50%}
.fin-summary h3{color:rgba(255,255,255,0.7);font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px}
.fin-summary .total{color:#fff;font-size:32px;font-weight:800;letter-spacing:-1px}
.fin-summary .sub{color:rgba(255,255,255,0.65);font-size:12px;margin-top:4px}
.fin-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px;position:relative;z-index:1}
.fin-stat{background:rgba(255,255,255,0.12);border-radius:12px;padding:10px 12px;border:1px solid rgba(255,255,255,0.15)}
.fin-stat .fn{font-size:16px;font-weight:800;color:#fff}
.fin-stat .fl{font-size:10px;color:rgba(255,255,255,0.65);font-weight:600;margin-top:2px}

/* LOANS SUMMARY — red gradient to distinguish */
.loan-summary{background:linear-gradient(135deg,#7f1d1d,#991b1b);border-radius:20px;padding:20px;margin-bottom:12px;position:relative;overflow:hidden}
.loan-summary::before{content:’’;position:absolute;top:-20px;right:-20px;width:100px;height:100px;background:rgba(255,255,255,0.07);border-radius:50%}
.loan-summary h3{color:rgba(255,255,255,0.7);font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px}
.loan-summary .total{color:#fff;font-size:32px;font-weight:800;letter-spacing:-1px}
.loan-summary .sub{color:rgba(255,255,255,0.65);font-size:12px;margin-top:4px}
.loan-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px;position:relative;z-index:1}
.loan-stat{background:rgba(255,255,255,0.12);border-radius:12px;padding:10px 12px;border:1px solid rgba(255,255,255,0.15)}
.loan-stat .fn{font-size:16px;font-weight:800;color:#fff}
.loan-stat .fl{font-size:10px;color:rgba(255,255,255,0.65);font-weight:600;margin-top:2px}

/* INVESTMENT CARDS */
.inv-card{background:var(–card);border-radius:18px;border:1px solid var(–border);padding:16px;margin-bottom:10px;box-shadow:0 2px 8px rgba(0,0,0,0.05)}
.inv-type-badge{display:inline-block;font-size:11px;padding:3px 10px;border-radius:99px;font-weight:700;margin-bottom:10px}
.inv-stocks{background:#fff7ed;color:#c2410c}
.inv-mf{background:#f0fdf4;color:#15803d}
.inv-fd{background:#eff6ff;color:#1d4ed8}
.inv-gold{background:#fffbeb;color:#b45309}
.inv-loan{background:var(–loan-light);color:var(–loan)}
.inv-other{background:#f5f3ff;color:#7c3aed}
.inv-name{font-size:16px;font-weight:700;color:var(–text);margin-bottom:12px}
.inv-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.inv-field{background:var(–bg);border-radius:12px;padding:10px 12px}
.inv-field .lbl{font-size:10px;font-weight:700;color:var(–text3);text-transform:uppercase;letter-spacing:.04em;margin-bottom:3px}
.inv-field .val{font-size:14px;font-weight:700;color:var(–text)}
.inv-field .val.green{color:#16a34a}
.inv-field .val.blue{color:#2563eb}
.inv-field .val.red{color:#dc2626}
.inv-progress-wrap{margin-top:4px}
.inv-progress-lbl{display:flex;justify-content:space-between;font-size:11px;color:var(–text2);margin-bottom:5px}
.inv-actions{display:flex;gap:8px;margin-top:12px}
.inv-actions button{flex:1;padding:9px;border:none;border-radius:10px;font-size:12px;font-weight:700;cursor:pointer;transition:.2s}
.inv-edit-btn{background:#f5f3ff;color:#7c3aed}
.inv-del-btn{background:#fef2f2;color:#dc2626}
.inv-actions button:active{transform:scale(0.97)}

/* PROGRESS BAR */
.pbar-row{margin-bottom:10px}
.pbar-row:last-child{margin-bottom:0}
.pbar-head{display:flex;justify-content:space-between;font-size:12px;margin-bottom:5px}
.pbar-track{height:7px;background:#f1f5f9;border-radius:99px;overflow:hidden}
.pbar-fill{height:100%;border-radius:99px;transition:width .6s cubic-bezier(.4,0,.2,1)}
.fill-red{background:linear-gradient(90deg,#ef4444,#f87171)}
.fill-amber{background:linear-gradient(90deg,#f59e0b,#fcd34d)}
.fill-green{background:linear-gradient(90deg,#22c55e,#86efac)}
.fill-blue{background:linear-gradient(90deg,#3b82f6,#93c5fd)}
.fill-purple{background:linear-gradient(90deg,#8b5cf6,#c4b5fd)}

/* STUCK CARDS */
.stuck-card{background:var(–card);border-radius:16px;padding:14px;margin-bottom:10px;border:2px solid #fde68a}
.stuck-card.urgent{border-color:#fca5a5}
.stuck-urgent{font-size:11px;font-weight:700;color:#dc2626;margin-bottom:6px}
.stuck-title{font-size:15px;font-weight:700;color:var(–text);margin-bottom:8px}
.green-btn{width:100%;padding:12px;background:linear-gradient(135deg,#22c55e,#16a34a);color:#fff;font-size:13px;font-weight:700;border:none;border-radius:12px;cursor:pointer;margin-top:10px;transition:.2s}
.green-btn:active{transform:scale(0.98)}

/* STREAK */
.streak-badge{display:inline-flex;align-items:center;gap:6px;background:linear-gradient(135deg,#f59e0b,#ef4444);color:#fff;font-size:12px;font-weight:700;padding:6px 14px;border-radius:99px}

/* NET WORTH CARD */
.networth-card{border-radius:20px;padding:20px;margin-bottom:12px;position:relative;overflow:hidden}
.networth-card.positive{background:linear-gradient(135deg,#0c4a6e,#075985)}
.networth-card.negative{background:linear-gradient(135deg,#450a0a,#7f1d1d)}
.networth-card::before{content:’’;position:absolute;top:-30px;right:-30px;width:130px;height:130px;background:rgba(255,255,255,0.07);border-radius:50%}
.networth-label{color:rgba(255,255,255,0.65);font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;margin-bottom:4px;position:relative;z-index:1}
.networth-value{font-size:36px;font-weight:900;color:#fff;letter-spacing:-1.5px;position:relative;z-index:1;line-height:1}
.networth-sub{font-size:12px;color:rgba(255,255,255,0.6);margin-top:6px;position:relative;z-index:1}
.networth-breakdown{display:flex;gap:10px;margin-top:14px;position:relative;z-index:1}

<script>
// ── STATE ─────────────────────────────────────────────────────────────
const TODAY = new Date().toISOString().split("T")[0];

let investments = JSON.parse(localStorage.getItem("tm_investments")||"null") || [
  {id:101,name:"Reliance Industries",type:"Stocks",amount:50000,roi:15,startDate:"2025-01-10",exitDate:"2027-01-10",notes:"Long term hold via Zerodha"},
  {id:102,name:"SBI Bluechip Fund",type:"Mutual Fund",amount:120000,roi:12,startDate:"2024-06-01",exitDate:"2029-06-01",notes:"Monthly SIP ₹5000"},
  {id:103,name:"HDFC FD",type:"FD",amount:200000,roi:7.5,startDate:"2025-03-01",exitDate:"2026-03-01",notes:"Auto-renewal"},
  {id:104,name:"Sovereign Gold Bond",type:"Gold/SGB",amount:75000,roi:8,startDate:"2023-11-15",exitDate:"2031-11-15",notes:"RBI SGB Series"},
];

let loans = JSON.parse(localStorage.getItem("tm_loans")||"null") || [
  {id:201,name:"Home Loan - HDFC",type:"Home Loan",principal:3000000,rate:8.5,emi:26500,tenure:240,startDate:"2022-01-01",endDate:"2041-12-31",notes:"HDFC Bank, Account ending 4521"},
  {id:202,name:"Car Loan - SBI",type:"Car Loan",principal:600000,rate:9.2,emi:12500,tenure:60,startDate:"2024-06-01",endDate:"2029-05-31",notes:"SBI Auto Loan"},
];

let editId = null, editType = null;
let currentInvType = "Stocks";
let currentLoanType = "Home Loan";
let currentRecurFreq = "daily";
let currentTab = "dashboard";
let filterStatus = "All", filterPri = "All", sortBy = "dueDate", searchQ = "";

function saveData(){
  localStorage.setItem("tm_tasks",JSON.stringify(tasks));
  localStorage.setItem("tm_investments",JSON.stringify(investments));
  localStorage.setItem("tm_loans",JSON.stringify(loans));
}
function isOverdue(t){ return t.dueDate && t.dueDate < TODAY && t.status!=="Done"; }
function daysUntil(d){
  if(!d) return null;
  return Math.round((new Date(d)-new Date(TODAY))/(1000*60*60*24));
}
function countdownHTML(t){
  if(t.status==="Done") return "";
  const d = daysUntil(t.dueDate);
  if(d===null) return "";
  if(d<0) return `<span class="countdown cd-overdue">⚠ ${Math.abs(d)}d overdue</span>`;
  if(d===0) return `<span class="countdown cd-today">Due today!</span>`;
  if(d<=3) return `<span class="countdown cd-soon">${d}d left</span>`;
  return `<span class="countdown cd-ok">${d}d left</span>`;
}

// Advance a recurring task's due date when marked done
function getNextDueDate(task){
  if(!task.dueDate) return TODAY;
  const base = new Date(task.dueDate);
  const freq = task.frequency||"daily";
  if(freq==="daily"){ base.setDate(base.getDate()+1); }
  else if(freq==="weekly"){ base.setDate(base.getDate()+7); }
  else if(freq==="monthly"){ base.setMonth(base.getMonth()+1); }
  else if(freq==="weekdays"){
    base.setDate(base.getDate()+1);
    while(base.getDay()===0||base.getDay()===6) base.setDate(base.getDate()+1);
  }
  return base.toISOString().split("T")[0];
}

// Net worth helpers
function calcNetWorth(){
  const totalInv = investments.reduce((s,i)=>s+Number(i.amount),0);
  const totalLoan = loans.reduce((s,l)=>s+Number(l.principal),0);
  return {netWorth: totalInv - totalLoan, totalInv, totalLoan};
}

// EMI calendar: next due date for each loan (1st of each month by default, or start day)
function getEMIDueThisMonth(loan){
  const now = new Date(TODAY);
  const day = loan.startDate ? new Date(loan.startDate).getDate() : 1;
  const dueDate = new Date(now.getFullYear(), now.getMonth(), day);
  return dueDate.toISOString().split("T")[0];
}

// ── CATEGORIES ────────────────────────────────────────────────────────
const CATS = [
  {id:"dashboard",label:"📊 Dashboard"},
  {id:"today",label:"📅 Today"},
  {id:"work",label:"💼 Work"},
  {id:"personal",label:"🏠 Personal"},

  {id:"other",label:"📦 Other"},
  {id:"stuck",label:"⚠️ Stuck"},
];

function renderCatTabs(){
  const todayCount = tasks.filter(t=>t.dueDate===TODAY&&t.status!=="Done").length;
  document.getElementById("cat-tabs").innerHTML = CATS.map(c=>{
    const badge = c.id==="today"&&todayCount>0

      : "";
    return `<button class="cat-tab ${currentTab===c.id?"active":""}" onclick="switchTab('${c.id}')">${c.label}${badge}</button>`;
  }).join("");
}

function switchTab(id){
  currentTab = id;
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
  document.getElementById("page-"+id).classList.add("active");
  renderCatTabs();
  render();
}

// ── TASK CARD HTML ─────────────────────────────────────────────────────
const STATUSES=["To Do","In Progress","Done"];
const CHK={"To Do":"chk-todo ○","In Progress":"chk-prog ◑","Done":"chk-done ✓"};

function taskCardHTML(t){
  const ov=isOverdue(t);
  const chk=CHK[t.status].split(" ");
  const freqLabels={daily:"Daily",weekly:"Weekly",monthly:"Monthly",weekdays:"Weekdays"};
  const recurBadge = t.recurring ? `<span class="recur-badge">🔁 ${freqLabels[t.frequency]||"Recurring"}</span>` : "";
  return `<div class="task-card ${ov?"overdue":""} ${t.status==="Done"?"done-card":""}">
    <div class="tc-row">
      <button class="tc-check ${chk[0]}" onclick="cycleStatus(${t.id})">${chk[1]}</button>
      <div class="tc-body">
        <div class="tc-title ${t.status==="Done"?"done":""}">${t.title}</div>
        <div class="tc-meta">
          <span class="pill pill-${t.priority.toLowerCase()}">${t.priority}</span>
          <span class="pill pill-${t.status==="To Do"?"todo":t.status==="In Progress"?"prog":"done"}">${t.status}</span>
          <span class="pill pill-cat">${t.category}</span>
          ${recurBadge}
          ${t.dueDate?`<span class="date-lbl ${ov?"urgent":daysUntil(t.dueDate)<=3?"soon":""}">📅 ${t.dueDate}</span>`:""}
          ${countdownHTML(t)}
        </div>
        ${t.notes?`<div style="font-size:12px;color:var(--text3);margin-top:5px;font-style:italic">${t.notes}</div>`:""}
      </div>
      <div class="tc-actions">
        <button onclick="openEditTask(${t.id})">✏️</button>
        <button onclick="deleteTask(${t.id})">🗑️</button>
      </div>
    </div>
  </div>`;
}

// ── TODAY PAGE ─────────────────────────────────────────────────────────
function renderTodayPage(){
  const todayTasks = [...tasks].filter(t=>t.dueDate===TODAY).sort((a,b)=>{
    const po=["High","Medium","Low"];
    return po.indexOf(a.priority)-po.indexOf(b.priority);
  });
  const pending = todayTasks.filter(t=>t.status!=="Done");
  const done = todayTasks.filter(t=>t.status==="Done");
  const dateStr = new Date().toLocaleDateString("en-IN",{weekday:"long",day:"numeric",month:"long"});

  const html = `
    <div class="pad">
      <div class="today-page-header">
        <div class="today-page-date">${dateStr}</div>
        <div class="today-page-title">Today's Tasks</div>
        <div class="today-page-sub">${pending.length===0?"All done for today! 🎉":`${pending.length} task${pending.length>1?"s":""} remaining`}</div>
        <div class="today-count-row">
          <div class="today-count">
            <div class="n">${todayTasks.length}</div>
            <div class="l">Total Today</div>
          </div>
          <div class="today-count">
            <div class="n" style="color:#fca5a5">${pending.length}</div>
            <div class="l">Remaining</div>
          </div>
          <div class="today-count">
            <div class="n" style="color:#86efac">${done.length}</div>
            <div class="l">Completed</div>
          </div>
        </div>
      </div>

      ${pending.length===0&&done.length===0?`
        <div class="empty-state">
          <div class="emoji">🎯</div>
          <div class="etitle">Nothing due today!</div>
          <div class="esub">Enjoy your free day or add a task with today's date.</div>
        </div>
        <button onclick="openModal('task')" style="display:block;margin:0 auto;padding:13px 28px;background:linear-gradient(135deg,var(--indigo),var(--purple));color:#fff;font-size:13px;font-weight:700;border:none;border-radius:14px;cursor:pointer">
          ＋ Add Task for Today
        </button>
      `:""}

      ${pending.length>0?`
        <div style="font-size:12px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px">
          Pending (${pending.length})
        </div>
        ${pending.map(t=>taskCardHTML(t)).join("")}

function formatNum(n){
  if(n>=10000000) return (n/10000000).toFixed(1)+"Cr";
  if(n>=100000) return (n/100000).toFixed(1)+"L";
  if(n>=1000) return (n/1000).toFixed(1)+"K";
  return n.toString();
}

// ── TASK LIST PAGE ─────────────────────────────────────────────────────
function renderTaskPage(cat){
  let list = [...tasks];
  if(cat!=="all") list=list.filter(t=>t.category.toLowerCase()===cat);
  if(filterStatus!=="All") list=list.filter(t=>t.status===filterStatus);
  if(filterPri!=="All") list=list.filter(t=>t.priority===filterPri);
  if(searchQ) list=list.filter(t=>t.title.toLowerCase().includes(searchQ.toLowerCase()));
  list.sort((a,b)=>{
    if(sortBy==="dueDate"){
      if(!a.dueDate&&!b.dueDate) return 0;
      if(!a.dueDate) return 1; if(!b.dueDate) return -1;
      return a.dueDate.localeCompare(b.dueDate);
    }
    if(sortBy==="priority") return ["High","Medium","Low"].indexOf(a.priority)-["High","Medium","Low"].indexOf(b.priority);
    return a.title.localeCompare(b.title);
  });

  const pageId = cat==="all"?"work":cat;
  const html = `
    <div class="search-wrap">
      <div class="search-box">
        <span class="search-ico">🔍</span>
        <input type="text" placeholder="Search tasks..." value="${searchQ}" oninput="setSearch(this.value,'${pageId}')"/>
      </div>
    </div>
    <div class="filter-bar">
      ${["All","To Do","In Progress","Done"].map(s=>
        `<button class="fb ${filterStatus===s?"fb-on-s":"fb-off"}" onclick="setFS('${s}','${pageId}')">${s}</button>`
      ).join("")}
    </div>
    <div class="filter-bar" style="padding-top:0">
      ${["All","High","Medium","Low"].map(p=>
        `<button class="fb ${filterPri===p?"fb-on-p":"fb-off"}" onclick="setFP('${p}','${pageId}')">${p}</button>`
      ).join("")}
      <select class="sort-sel" onchange="setSort(this.value,'${pageId}')">
        <option value="dueDate" ${sortBy==="dueDate"?"selected":""}>📅 By Date</option>
        <option value="priority" ${sortBy==="priority"?"selected":""}>🔥 By Priority</option>
        <option value="title" ${sortBy==="title"?"selected":""}>🔤 By Name</option>
      </select>
    </div>
    <div style="padding:8px 16px 0">
      <button onclick="openModal('task')" style="width:100%;padding:12px;background:linear-gradient(135deg,var(--indigo),var(--purple));color:#fff;font-size:13px;font-weight:700;border:none;border-radius:14px;cursor:pointer;margin-bottom:4px">
        ＋ Add New Task
      </button>
    </div>
    <div style="padding:8px 16px 0">
      ${list.length===0
        ? `<div class="empty-state"><div class="emoji">✅</div><div class="etitle">No tasks here!</div><div class="esub">Add a task or adjust your filters</div></div>`
        : list.map(t=>taskCardHTML(t)).join("")}
    </div>
  `;
  document.getElementById("page-"+pageId).innerHTML = html;
}

function setFS(v,page){filterStatus=v; renderTaskPage(page);}
function setFP(v,page){filterPri=v; renderTaskPage(page);}
function setSort(v,page){sortBy=v; renderTaskPage(page);}
function setSearch(v,page){searchQ=v; renderTaskPage(page);}

function switchTabFiltered(status, pri){
  filterStatus=status; filterPri=pri;

}

function renderEMICalendar(){
  if(loans.length===0) return "";
  const monthName = new Date().toLocaleDateString("en-IN",{month:"long",year:"numeric"});
  const totalEMI = loans.reduce((s,l)=>s+Number(l.emi),0);

  const rows = loans.map(loan=>{
    const dueDate = getEMIDueThisMonth(loan);
    const d = daysUntil(dueDate);
    let cls="due-ok", badgeCls="emi-due-ok-badge", badgeText="On track";
    if(d===0){ cls="due-today"; badgeCls="emi-due-today-badge"; badgeText="Due today!"; }
    else if(d<0){ cls="due-soon"; badgeCls="emi-due-soon-badge"; badgeText="Overdue"; }
    else if(d<=5){ cls="due-soon"; badgeCls="emi-due-soon-badge"; badgeText=`Due in ${d}d`; }
    const icons={"Home Loan":"🏠","Car Loan":"🚗","Personal Loan":"👤","Education Loan":"🎓","Business Loan":"💼","Other Loan":"📋"};
    return `<div class="emi-row">
      <div class="emi-icon ${cls}">${icons[loan.type]||"📋"}</div>
      <div class="emi-info">
        <div class="emi-name">${loan.name}</div>
        <div class="emi-due-date">Due: ${dueDate}</div>

      <div>

        <span class="emi-status-badge ${badgeCls}">${badgeText}</span>
      </div>

  return `
    <div class="sec-div">📆 EMI Calendar — ${monthName}</div>
    <div class="emi-calendar-card">
      <div class="emi-month-header">
        <div class="emi-month-title">This Month's EMIs</div>

// ── ACTIONS ────────────────────────────────────────────────────────────
function cycleStatus(id){
  const t = tasks.find(x=>x.id===id);
  const nextIdx = (STATUSES.indexOf(t.status)+1)%3;
  const nextStatus = STATUSES[nextIdx];
  // If recurring task is being marked Done, reset it with next due date
  if(t.recurring && nextStatus==="Done"){
    tasks = tasks.map(x=>x.id!==id?x:{...x, status:"To Do", dueDate:getNextDueDate(x)});
    saveData(); render();
    // Show a quick confirmation
    const btn = event.target;
    const orig = btn.innerHTML;
    btn.innerHTML = "✓";
    btn.style.borderColor = "var(--green)";
    setTimeout(()=>render(), 1200);
    return;
  }
  tasks=tasks.map(x=>x.id!==id?x:{...x,status:nextStatus});
  saveData(); render();
}
function markDone(id){
  const t = tasks.find(x=>x.id===id);
  if(t.recurring){
    tasks = tasks.map(x=>x.id!==id?x:{...x, status:"To Do", dueDate:getNextDueDate(x)});
  } else {
    tasks=tasks.map(x=>x.id===id?{...x,status:"Done"}:x);
  }
  saveData(); render();
}
function deleteTask(id){
  if(confirm("Delete this task?")){ tasks=tasks.filter(t=>t.id!==id); saveData(); render(); }
}
function deleteInvestment(id){
  if(confirm("Delete this investment?")){ investments=investments.filter(i=>i.id!==id); saveData(); render(); }
}
function deleteLoan(id){
  if(confirm("Delete this loan?")){ loans=loans.filter(l=>l.id!==id); saveData(); render(); }
}

let modalMode = "task";

function openModal(type){
  modalMode=type||"task";
  editId=null; editType=null;
  const titles={task:"New Task",investment:"New Investment",loan:"New Loan"};
  const subs={task:"Add a task to stay on track",investment:"Track your investment portfolio",loan:"Track a loan or EMI"};
  document.getElementById("modal-title").textContent=titles[type]||"New Task";
  document.getElementById("modal-sub").textContent=subs[type]||"";
  document.getElementById("modal-type-tabs").style.display="flex";
  document.getElementById("save-btn").textContent="Save ✓";
  document.getElementById("task-form").style.display="none";
  document.getElementById("inv-form").style.display="none";
  document.getElementById("loan-form").style.display="none";

  if(type==="investment"){
    document.getElementById("inv-form").style.display="block";
    clearInvForm();
  } else if(type==="loan"){
    document.getElementById("loan-form").style.display="block";
    clearLoanForm();
  } else {
    document.getElementById("task-form").style.display="block";
    clearTaskForm();
  }
  document.querySelectorAll(".mtt").forEach(b=>{
    const t=b.getAttribute("onclick").match(/'([^']+)'/)?.[1];
    b.classList.toggle("on",t===type);
  });
  document.getElementById("overlay").classList.add("open");
}

function switchModalType(type,btn){
  modalMode=type;
  document.querySelectorAll(".mtt").forEach(b=>b.classList.remove("on"));
  btn.classList.add("on");
  document.getElementById("task-form").style.display=type==="task"?"block":"none";
  document.getElementById("inv-form").style.display=type==="investment"?"block":"none";
  document.getElementById("loan-form").style.display=type==="loan"?"block":"none";
}

function saveItem(){
  if(modalMode==="loan"||editType==="loan"){
    const name=document.getElementById("l-name").value.trim();
    if(!name){ alert("Please enter a loan name!"); return; }
    const loan={
      id:editId||Date.now(),
      name, type:currentLoanType,
      principal:Number(document.getElementById("l-principal").value)||0,
      rate:Number(document.getElementById("l-rate").value)||0,
      emi:Number(document.getElementById("l-emi").value)||0,
      tenure:Number(document.getElementById("l-tenure").value)||0,
      startDate:document.getElementById("l-start").value,
      endDate:document.getElementById("l-end").value,
      notes:document.getElementById("l-notes").value,
    };
    if(editId&&editType==="loan") loans=loans.map(l=>l.id===editId?loan:l);
    else loans=[...loans,loan];
  } else if(modalMode==="investment"||editType==="investment"){
    const name=document.getElementById("i-name").value.trim();
    if(!name){ alert("Please enter an investment name!"); return; }
    const inv={
      id:editId||Date.now(),
      name, type:currentInvType,
      amount:Number(document.getElementById("i-amount").value)||0,
      roi:Number(document.getElementById("i-roi").value)||0,
      startDate:document.getElementById("i-start").value,
      exitDate:document.getElementById("i-exit").value,
      notes:document.getElementById("i-notes").value,
    };
    if(editId&&editType==="investment") investments=investments.map(i=>i.id===editId?inv:i);
    else investments=[...investments,inv];
  } else {
    const title=document.getElementById("f-title").value.trim();
    if(!title){ alert("Please enter a task title!"); return; }
    const isRecur=document.getElementById("f-recurring").checked;
    const task={
      id:editId||Date.now(),
      title,
      priority:document.getElementById("f-priority").value,
      status:document.getElementById("f-status").value,
      dueDate:document.getElementById("f-date").value,
      category:document.getElementById("f-category").value,
      notes:document.getElementById("f-notes").value,
      recurring:isRecur,
      frequency:isRecur?currentRecurFreq:"",
    };
    if(editId&&editType==="task") tasks=tasks.map(t=>t.id===editId?task:t);
    else tasks=[...tasks,task];
  }
  saveData(); closeModal(); render();
}
